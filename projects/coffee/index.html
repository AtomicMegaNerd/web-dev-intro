<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coffee Masters</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/coffee.css" />
  </head>
  <body>
    <div class="main-banner">
      <div class="main-logo">
        <img
          class="main-logo-image"
          src="./img/coffee_masters_logo.png"
          alt="Coffe Masters"
        />
        <span class="main-logo-text">Coffee Masters</span>
      </div>
    </div>
    <div class="my-page">
      <!-- items pane -->
      <div class="items-pane pane">
        <div class="pane-title">ITEMS</div>
        <div class="menu-items-list">
          <div class="menu-item">
            <div class="menu-item-amount">1x</div>
            <div class="menu-item-sku">Cappucino</div>
            <div class="menu-item-price">$6.00</div>
            <div class="ingredients">
              <div class="ingredient">Light Foam</div>
            </div>
          </div>
          <div class="menu-item">
            <div class="menu-item-amount">1x</div>
            <div class="menu-item-sku">Cappucino</div>
            <div class="menu-item-price">$7.90</div>
            <div class="ingredients">
              <div class="ingredient">Almond Milk</div>
              <div class="ingredient">Double Espresso Shot</div>
            </div>
          </div>
          <div class="menu-item">
            <div class="menu-item-amount">1x</div>
            <div class="menu-item-sku">Croissant</div>
            <div class="menu-item-price">$5.37</div>
            <div class="ingredients">
              <div class="ingredient">Butter</div>
            </div>
          </div>
        </div>
      </div>

      <div class="name-pane pane">
        <div class="pane-title">NAME</div>
      </div>
      <div class="payment-pane pane">
        <div class="pane-title">PAYMENT</div>
      </div>
      <div class="totals-pane">
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Numquam nulla
        labore iure.
      </div>
      <div class="place-order-pane">Lorem, ipsum dolor.</div>
    </div>
  </body>
</html>
