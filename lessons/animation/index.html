<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Animation</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div>
      <div class="spin-emoji">🤓</div>
      <div class="drunk-emoji">🤓</div>
    </div>
    <ul class="dancers-list">
      <li>linear: <span class="dancer linear">💃</span></li>
      <li>ease: <span class="dancer ease">💃</span></li>
      <li>ease-in-out: <span class="dancer ease-in-out">💃</span></li>
      <li>ease-in: <span class="dancer ease-in">💃</span></li>
      <li>ease-out: <span class="dancer ease-out">💃</span></li>
      <li>cubic-bezier: <span class="dancer cubic-bezier">💃</span></li>
    </ul>
    <div>
      <div class="rainbow-animate">CSS is Aweseome!</div>
    </div>
  </body>
</html>
