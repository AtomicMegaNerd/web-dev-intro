<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS is fun</title>
    <style>
      * {
        /* Include the border when measuring widths, content-box is the default */
        box-sizing: border-box;
      }
      .flex-container {
        display: flex;
        width: 100%;
        margin-top: 30px;
        margin-bottom: 30px;
      }
      .reverse {
        flex-direction: row-reverse;
      }
      .box-1 {
        background-color: crimson;
        color: white;
        padding: 5px;
        width: 300px;
        height: 200px;
        border: 1px solid black;
      }
      .box-2 {
        background-color: darkolivegreen;
        color: white;
        padding: 5px;
        width: 400px;
        height: 100px;
        border: 1px solid black;
      }
      .box-3 {
        background-color: darkslateblue;
        color: white;
        padding: 5px;
        width: 200px;
        height: 300px;
        border: 1px solid black;
      }
      h1.main-title {
        color: crimson;
        font-family: "Helvetica Neue", "Arial", "sans-serif";
        font-size: 3em;
      }
    </style>
  </head>
  <body>
    <h1 class="main-title">Fun with CSS</h1>
    <div class="flex-container">
      <div class="box-1">1</div>
      <div class="box-2">2</div>
      <div class="box-3">3</div>
    </div>
    <div class="flex-container reverse">
      <div class="box-1">1</div>
      <div class="box-2">2</div>
      <div class="box-3">3</div>
    </div>
  </body>
</html>
